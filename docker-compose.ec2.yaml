services:
  # ============================================
  # Nginx - Official image from Docker Hub
  # ============================================
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./dockers/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./dockers/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./dockers/nginx/.htpasswd:/etc/nginx/.htpasswd:ro
    depends_on:
      - app
    networks:
      - frugalaigpt-network
    restart: unless-stopped
    command: sh -c "apk add --no-cache apache2-utils && nginx -g 'daemon off;'"

  # ============================================
  # FrugalAI App - Pull from ECR
  # ============================================
  app:
    image: 975226449092.dkr.ecr.ap-southeast-1.amazonaws.com/frugalaigpt-app:latest
    environment:
      - DATA_DIR=/home/frugalaigpt
      - NODE_ENV=production
      # Ollama configuration
      - OLLAMA_API_URL=http://your-ollama-server:11434
      # Optional: Other model configurations
      # - SERPER_API_KEY=your_key_here
    expose:
      - "3000"
    networks:
      - frugalaigpt-network
    volumes:
      - backend-dbstore:/home/frugalaigpt/data
      - uploads:/home/frugalaigpt/uploads
      - /home/ubuntu/etc/config.toml:/home/frugalaigpt/config.toml:ro
    restart: unless-stopped

networks:
  frugalaigpt-network:
    driver: bridge

volumes:
  backend-dbstore:
  uploads:
