<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="truegpt-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF3366;stop-opacity:1" />
      <stop offset="33%" style="stop-color:#FF66CC;stop-opacity:1" />
      <stop offset="66%" style="stop-color:#9966FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6699FF;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Rounded square background -->
  <rect width="200" height="200" rx="40" fill="url(#truegpt-gradient)"/>
  
  <!-- "true" text -->
  <text x="100" y="120" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="white" text-anchor="middle">true</text>
</svg>
